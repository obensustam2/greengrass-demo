# .github/workflows/cd.yml
#
# CD Pipeline — Omegga Robot Telemetry Component
#
# Triggers only on merge to main branch.
# Pipeline:
#   1. Publish component to AWS (gdk component publish → S3 + Greengrass registry)
#   2. Deploy to robot fleet (aws greengrassv2 create-deployment)
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID       — IAM user access key
#   AWS_SECRET_ACCESS_KEY   — IAM user secret key
#   AWS_REGION              — e.g. eu-central-1
#   THING_GROUP_ARN         — arn:aws:iot:eu-central-1:ACCOUNT:thinggroup/AllRobots

name: CD — Deploy to Robot Fleet

on:
  push:
    branches:
      - test
    paths:
      - 'greengrass-telemetry/**'   # only trigger when component code changes
  workflow_dispatch:                 # allow manual trigger from GitHub UI

env:
  COMPONENT_NAME: com.omegga.RobotTelemetry

jobs:

  # ──────────────────────────────────────────
  # JOB 1: Publish to AWS
  # ──────────────────────────────────────────
  publish:
    name: Publish to AWS
    runs-on: ubuntu-latest
    outputs:
      component_version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install GDK CLI
        run: pip install git+https://github.com/aws-greengrass/aws-greengrass-gdk-cli.git

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Publish component to AWS
        working-directory: greengrass-telemetry
        run: gdk component publish

      - name: Get published version
        id: get_version
        run: |
          VERSION=$(aws greengrassv2 list-components \
            --region ${{ secrets.AWS_REGION }} \
            --query "components[?componentName=='${{ env.COMPONENT_NAME }}'].latestVersion.componentVersion" \
            --output text)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Published version: $VERSION"

  # ──────────────────────────────────────────
  # JOB 2: Deploy to Fleet
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to Robot Fleet
    runs-on: ubuntu-latest
    needs: publish
    environment: production    # optional: adds manual approval gate in GitHub

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Deploy to AllRobots fleet
        id: deploy
        run: |
          DEPLOYMENT=$(aws greengrassv2 create-deployment \
            --target-arn ${{ secrets.THING_GROUP_ARN }} \
            --deployment-name "cd-deploy-${{ github.sha }}" \
            --components '{
              "aws.greengrass.Nucleus":    {"componentVersion": "2.17.0"},
              "aws.greengrass.Cli":        {"componentVersion": "2.17.0"},
              "com.omegga.RobotTelemetry": {"componentVersion": "${{ needs.publish.outputs.component_version }}"}
            }' \
            --deployment-policies '{
              "failureHandlingPolicy": "ROLLBACK",
              "componentUpdatePolicy": {
                "action": "NOTIFY_COMPONENTS",
                "timeoutInSeconds": 60
              }
            }' \
            --region ${{ secrets.AWS_REGION }})

          DEPLOYMENT_ID=$(echo $DEPLOYMENT | python3 -c "import sys,json; print(json.load(sys.stdin)['deploymentId'])")
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "Deployment ID: $DEPLOYMENT_ID"

      - name: Wait for deployment to complete
        run: |
          DEPLOYMENT_ID=${{ steps.deploy.outputs.deployment_id }}
          echo "Waiting for deployment $DEPLOYMENT_ID..."

          for i in {1..20}; do
            STATUS=$(aws greengrassv2 get-deployment \
              --deployment-id $DEPLOYMENT_ID \
              --region ${{ secrets.AWS_REGION }} \
              --query 'deploymentStatus' \
              --output text)

            echo "[$i/20] Status: $STATUS"

            if [ "$STATUS" = "COMPLETED" ]; then
              echo "Deployment completed successfully!"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "Deployment failed — Greengrass will rollback automatically."
              exit 1
            fi

            sleep 30
          done

          echo "Timed out after 10 minutes"
          exit 1

      - name: Summary
        if: success()
        run: |
          echo "✅ Fleet deployment successful!"
          echo "Component : ${{ env.COMPONENT_NAME }}"
          echo "Version   : ${{ needs.publish.outputs.component_version }}"
          echo "Commit    : ${{ github.sha }}"
          echo "Target    : AllRobots fleet"
