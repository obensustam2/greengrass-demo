apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: omegga
      defaultBucket: robot-telemetry
      tlsSkipVerify: true
    secureJsonData:
      token: omegga-super-secret-token
    isDefault: true
    editable: true
